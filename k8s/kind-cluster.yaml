# kind-cluster.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: migration-orchestrator
nodes:
  - role: control-plane
    # Map the API NodePort (30800) to localhost:8000 so engineers can reach
    # the Orchestrator API at http://localhost:8000 without port-forwarding.
    extraPortMappings:
      - containerPort: 30800
        hostPort: 8000
        protocol: TCP
  - role: worker
  - role: worker