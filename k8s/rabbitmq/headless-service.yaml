  # k8s/rabbitmq/headless-service.yaml
  apiVersion: v1
  kind: Service
  metadata:
    name: rabbitmq-headless
    namespace: migration-orchestrator
  spec:
    clusterIP: None          # <-- this is what makes it headless
    selector:
      app: rabbitmq
    ports:
      - name: amqp
        port: 5672
      - name: management
        port: 15672
      - name: epmd
        port: 4369
        