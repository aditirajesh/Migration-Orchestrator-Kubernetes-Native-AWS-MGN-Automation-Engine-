# k8s/workers/poller-worker/deployment.yaml
#
# Monitors long-running AWS operations (replication sync, instance launch,
# disconnect). Re-enqueues itself until operations complete, then advances
# server state.
#
# AWS credentials required: the poller calls EC2 describe_instance_status
# for 2/2 reachability checks before advancing to AWAITING_TEST_VALIDATION
# and AWAITING_CUTOVER_VALIDATION.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: poller-worker
  namespace: migration-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poller-worker
  template:
    metadata:
      labels:
        app: poller-worker
    spec:
      containers:
        - name: poller-worker
          image: migration-orchestrator/workers:latest
          imagePullPolicy: Never
          command: ["python", "-m", "workers.run_poller"]
          env:
            # PostgreSQL
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: PG_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: database
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(PG_USER):$(PG_PASSWORD)@postgres.migration-orchestrator.svc.cluster.local:5432/$(PG_DATABASE)"

            # RabbitMQ
            - name: RABBIT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: username
            - name: RABBIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: password
            - name: AMQP_URL
              value: "amqp://$(RABBIT_USER):$(RABBIT_PASSWORD)@rabbitmq.migration-orchestrator.svc.cluster.local:5672/"

            # AWS credentials — needed for EC2 reachability checks
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SESSION_TOKEN
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_DEFAULT_REGION
